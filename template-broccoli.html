<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap UI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #8fa04a;
            font-family: Arial, sans-serif;
        }

        .title {
            text-align: center;
            color: white;
            margin: 50px 0;
            font-size: 2.5rem;
            font-weight: 600;
        }

        .card-custom {
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .card-custom img {
            width: 150px;
        }

        .quantity-box {
            background: #eee;
            border-radius: 30px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .btn-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #8fa04a;
            color: white;
            border: none;
            font-size: 20px;
        }

        .label {
            text-align: center;
            color: white;
            margin-top: 10px;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="title">Which one is better?</div>

        <div class="row justify-content-center g-4">

            <!-- Card A -->
            <div class="col-md-4">
                <div class="card card-custom">
                    <img src="/images/a/broccoli.png" alt="broccoli">
                    <h5 class="mt-3">Broccoli</h5>

                    <div class="quantity-box mt-3">
                        <button class="btn-circle">-</button>
                        <span class="fs-4">2lb</span>
                        <button class="btn-circle">+</button>
                    </div>
                </div>
                <div class="label">A</div>
            </div>

            <!-- Card B -->
            <div class="col-md-4">
                <div class="card card-custom">
                    <img src="/images/a/broccoli.png" alt="broccoli">
                    <h5 class="mt-3">Broccoli</h5>
                    <small>Choose Quantity</small>

                    <div class="quantity-box mt-2">
                        <span class="fs-4">02</span>
                        <span class="fs-5">lb</span>
                    </div>
                </div>
                <div class="label">B</div>
            </div>

        </div>
    </div>

</body>

</html>
